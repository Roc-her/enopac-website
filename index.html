<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enopac Property Group — property management, buyers agency and development opportunities for investors across WA and VIC."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Montserrat:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        background: #1a2428;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse 80% 60% at 50% 40%, #232f34 0%, #1a2428 70%);
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }

      #app-splash.app-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .app-splash-logo-main {
        font-family: Montserrat, system-ui, sans-serif;
        font-weight: 800;
        letter-spacing: 0.22em;
        color: #e6c773;
        font-size: clamp(1.375rem, 4.5vw, 2rem);
        line-height: 1.1;
      }

      .app-splash-logo-line {
        width: 110%;
        height: 1px;
        margin: 0.5rem 0 0.375rem;
        background: rgba(230, 199, 115, 0.18);
        overflow: hidden;
        position: relative;
      }

      .app-splash-logo-line::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 42%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #e6c773 45%, #f5e6b8 55%, transparent);
        animation: app-splash-sweep 1.15s cubic-bezier(0.45, 0, 0.25, 1) infinite;
      }

      .app-splash-logo-sub {
        font-family: Montserrat, system-ui, sans-serif;
        font-weight: 700;
        letter-spacing: 0.28em;
        color: rgba(230, 199, 115, 0.72);
        font-size: clamp(0.4375rem, 1.2vw, 0.5625rem);
        line-height: 1.2;
      }

      @keyframes app-splash-sweep {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-splash-logo-line::after {
          animation: none;
          width: 100%;
          background: rgba(230, 199, 115, 0.55);
        }
      }
    </style>
    <title>Enopac Property Group | Property Investment Experts</title>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true" data-started="">
      <div class="app-splash-inner">
        <div class="app-splash-logo-main">ENOPAC</div>
        <div class="app-splash-logo-line" aria-hidden="true"></div>
        <div class="app-splash-logo-sub">PROPERTY GROUP</div>
      </div>
    </div>
    <script>
      document.getElementById('app-splash').dataset.started = String(Date.now())
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
